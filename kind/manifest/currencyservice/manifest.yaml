apiVersion: v1
kind: Namespace
metadata:
  name: currencyservice

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: currencyservice
  labels:
    app: currencyservice
  namespace: currencyservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: currencyservice-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: currencyservice-app
    spec:
      # serviceAccountName: currencyservice
      # terminationGracePeriodSeconds: 5
      # securityContext:
      #   fsGroup: 1000
      #   runAsGroup: 1000
      #   runAsNonRoot: true
      #   runAsUser: 1000
      containers:
      - name: currencyservice-container
        # securityContext:
        #   allowPrivilegeEscalation: false
        #   capabilities:
        #     drop:
        #       - ALL
        #   privileged: false
        #   readOnlyRootFilesystem: true
        image: test/currencyservice:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 7000
        env:
        - name: PORT
          value: "7000"
        - name: DISABLE_PROFILER
          value: "1"
        - name: ENABLE_TRACING
          value: "0"
        - name: COLLECTOR_SERVICE_ADDR
          value: "localhost:1000"
        # readinessProbe:
        #   grpc:
        #     port: 7000
        # livenessProbe:
        #   grpc:
        #     port: 7000
        # resources:
        #   requests:
        #     cpu: 100m
        #     memory: 64Mi
        #   limits:
        #     cpu: 200m
        #     memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: currencyservice-svc
  labels:
    app: currencyservice
  namespace: currencyservice
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: currencyservice-app
  ports:
  - name: grpc
    port: 7000
    targetPort: 7000
