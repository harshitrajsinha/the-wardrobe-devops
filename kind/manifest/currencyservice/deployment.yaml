apiVersion: apps/v1
kind: Deployment
metadata:
  name: currencyservice
  labels:
    app: currencyservice
  namespace: currencyns
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: currencyservice-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: currencyservice-app
    spec:
      containers:
      - name: currencyservice-container
        # image: test/currencyservice:latest
        image: 211125424910.dkr.ecr.us-east-1.amazonaws.com/currencyns/currency:v1
        imagePullPolicy: IfNotPresent
        # imagePullPolicy: Never
        ports:
        - containerPort: 7000
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: currencyservice-config
              key: port
        - name: DISABLE_PROFILER
          valueFrom:
            configMapKeyRef:
              name: currencyservice-config
              key: disable-profiler
        - name: ENABLE_TRACING
          valueFrom:
            configMapKeyRef:
              name: currencyservice-config
              key: enable-tracing
        - name: COLLECTOR_SERVICE_ADDR
          valueFrom:
            configMapKeyRef:
              name: currencyservice-config
              key: collector-svc-addr
        resources:
          requests:
            cpu: 100m
            memory: 50Mi
          limits:
            cpu: 200m
            memory: 128Mi