apiVersion: v1
kind: Service
metadata:
  name: shippingservice-svc
  labels:
    app: shippingservice
  namespace: shippingns
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: shippingservice-app
  ports:
  - name: grpc
    protocol: TCP
    port: {{ .Values.shippingservice.service.port }}
    targetPort: {{ .Values.shippingservice.service.port }}