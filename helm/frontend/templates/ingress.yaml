apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-ingress
  namespace: frontendns
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/certificate-arn: "{{ .Values.ingress.certificateArn }}"
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/group.name: boutique-shared-alb
    alb.ingress.kubernetes.io/subnets: "{{ .Values.ingress.subnetIdList }}" # public subnets since internet-facing scheme
spec:
  ingressClassName: alb
  rules:
      - host: {{ .Values.ingress.host }}
        http:
          paths:
            - path: /
              pathType: Prefix
              backend:
                service:
                  name: frontend-svc
                  port:
                    number: {{ .Values.frontend.service.port }}

            - path: /product
              pathType: Prefix
              backend:
                service:
                  name: frontend-svc
                  port:
                    number: {{ .Values.frontend.service.port }}

            - path: /cart
              pathType: Prefix
              backend:
                service:
                  name: frontend-svc
                  port:
                    number: {{ .Values.frontend.service.port }}

            - path: /setCurrency
              pathType: Prefix
              backend:
                service:
                  name: frontend-svc
                  port:
                    number: {{ .Values.frontend.service.port }}

            - path: /logout
              pathType: Prefix
              backend:
                service:
                  name: frontend-svc
                  port:
                    number: {{ .Values.frontend.service.port }}

            - path: /assistant
              pathType: Prefix
              backend:
                service:
                  name: frontend-svc
                  port:
                    number: {{ .Values.frontend.service.port }}

            - path: /product-meta
              pathType: Prefix
              backend:
                service:
                  name: frontend-svc
                  port:
                    number: {{ .Values.frontend.service.port }}

            - path: /bot
              pathType: Prefix
              backend:
                service:
                  name:
                    frontend-svc
                  port:
                    number: {{ .Values.frontend.service.port }}

            - path: /robots.txt
              pathType: Exact
              backend:
                service:
                  name: frontend-svc
                  port:
                    number: {{ .Values.frontend.service.port }}

            - path: /_healthz
              pathType: Exact
              backend:
                service:
                  name: frontend-svc
                  port:
                    number: {{ .Values.frontend.service.port }}