apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  labels:
    app: frontend
  namespace: frontendns
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: frontend-app
  ports:
  - name: http
    port: {{ .Values.frontend.service.port }}
    targetPort: {{ .Values.frontend.service.port }}