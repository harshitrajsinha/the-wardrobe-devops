apiVersion: apps/v1
kind: Deployment
metadata:
  name: productcatalogservice
  labels:
    app: productcatalogservice
  namespace: productcatalogns
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: productcatalogservice-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: productcatalogservice-app
    spec:
      containers:
      - name: productcatalogservice-container
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: {{ .Values.productcatalogservice.service.port }}
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: productcatalog-config
              key: port
        - name: DISABLE_PROFILER
          valueFrom:
            configMapKeyRef:
              name: productcatalog-config
              key: disable-profiler
        - name: EXTRA_LATENCY
          valueFrom:
            configMapKeyRef:
              name: productcatalog-config
              key: extra-latency
        - name: ENABLE_TRACING
          valueFrom:
            configMapKeyRef:
              name: productcatalog-config
              key: enable-tracing
        - name: COLLECTOR_SERVICE_ADDR
          valueFrom:
            configMapKeyRef:
              name: productcatalog-config
              key: collector-addr
        resources:
          requests:
            cpu: 100m
            memory: 50Mi
          limits:
            cpu: 200m
            memory: 128Mi