name: CI pipeline - payment service, to run security scan, test, create and push payment service docker image

on:
  push: # change to pull_request in production
    branches:
      - main
    paths:
      - 'src/paymentservice/**'
      - '.github/workflows/**' # to be removed in production
permissions:
  contents: read

defaults:
  run:
    working-directory: src/paymentservice

jobs:

  security-scan:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
      
      - name: Install dependencies
        working-directory: src/paymentservice/src
        run: npm ci
      
      ### Secrets scan
      
      - name: Secrets scan
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_NOTIFY_USER_LIST: '@harshitrajsinha'
      
      ### Dependency scan:

      - name: Dependency scan
        # if: github.ref == 'refs/heads/dev'
        uses: oke-py/npm-audit-action@v4.0.2
        with:
          audit_level: high
          github_token: ${{ secrets.GITHUB_TOKEN }}
          issue_assignees: harshitrajsinha
          issue_labels: vulnerability,frontend
          working_directory: src/paymentservice/src
      - name: Display audit report
        run: npm audit --audit-level=high || true
      
      ## File system scan (paymentservice service):
      
      - name: Scan file system
        if: github.ref == 'refs/heads/main'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scanners: vuln,secret,misconfig
          scan-ref: src/paymentservice
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL
      
      ### SBOM generation:
      # Note -> Here we are generating dependency graph directly to GitHub insights rather than separate artifact
      - name: SBOM generation
        if: github.ref == 'refs/heads/main'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          format: 'github'
          output: 'dependency-results.sbom.json'
          scan-ref: src/paymentservice
          skip-setup-trivy: true
          github-pat: ${{ secrets.GITHUB_TOKEN }}

  linting:

    needs: [security-scan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      statuses: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
      
      - name: Install dependencies
        working-directory: src/paymentservice/src
        run: npm ci
          
      - name: Super-Linter
        uses: super-linter/super-linter@v8.6.0
        env:
          DEFAULT_BRANCH: 'main'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FILTER_REGEX_INCLUDE: '^src/paymentservice/src/.*'
        continue-on-error: true
        
  # unit-tests:
    # needs: [security-scan, linting]

  image-build-release:
    needs: [security-scan]
    # needs: [security-scan, linting, unit-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      IMAGE_NAME: paymentns/payment
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        
      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
      
      - name: Install dependencies
        working-directory: src/paymentservice/src
        run: npm ci
    
      
      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-ecr-push
          aws-region: ${{ vars.AWS_REGION }}

      # Login to ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Build and tag image
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./src/paymentservice
          file: ./src/paymentservice/Dockerfile
          push: false
          load: true
          tags: |
            ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{env.IMAGE_NAME}}:${{env.IMAGE_TAG}}

      ## Scan docker image using trivy
      - name: Docker image scan using Trivy
        if: github.ref == 'refs/heads/main'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{env.IMAGE_NAME}}:${{env.IMAGE_TAG}}
          format: table
          severity: HIGH,CRITICAL
          exit-code: 1
          github-pat: ${{ secrets.GITHUB_TOKEN }}

      # SBOM generation
      # Note -> Here we are generating separate artifact for SBOM rather than for GitHub insights
      - name: Generate SBOM for docker image
        if: github.ref == 'refs/heads/main'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: 'cyclonedx'
          output: 'docker-image.sbom.json'
          skip-setup-trivy: true
      - name: Upload trivy report as a Github artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sbom-docker-image-report
          path: 'docker-image.sbom.json'
      
      # Push image to ECR
      - name: Push image to ECR
        run: docker push ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/$IMAGE_NAME:$IMAGE_TAG
    
  update-newtag-in-helm-chart:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    needs: [image-build-release]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6.0.2
  

    - name: Update tag in Helm chart
      working-directory: .
      run: |
        sed -i 's/tag: .*/tag: "${{ github.sha }}"/' helm/paymentservice/values.yaml

    - name: Commit and push changes
      working-directory: .
      run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add helm/paymentservice/values.yaml
          git commit -m "Update paymentservice image tag to $IMAGE_TAG" || echo "No changes"
          git pull --rebase origin "$GITHUB_REF_NAME"

          git push