apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  labels:
    app: redis
  namespace: redisns
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: redis-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis-app
    spec:
      containers:
      - name: redis-container
        image: 211125424910.dkr.ecr.us-east-1.amazonaws.com/redisns/redis:alpine3.23
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 6379
        readinessProbe:
          periodSeconds: 5
          tcpSocket:
            port: 6379
        livenessProbe:
          periodSeconds: 5
          tcpSocket:
            port: 6379
        volumeMounts:
        - mountPath: /data
          name: redis-data
        resources:
          limits:
            memory: 100Mi
            cpu: 50m
          requests:
            cpu: 20m
            memory: 50Mi
      volumes:
      - name: redis-data
        emptyDir: {}
