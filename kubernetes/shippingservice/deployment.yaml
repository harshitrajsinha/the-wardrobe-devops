apiVersion: apps/v1
kind: Deployment
metadata:
  name: shippingservice
  labels:
    app: shippingservice
  namespace: shippingns
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: shippingservice-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shippingservice-app
    spec:
      containers:
      - name: shippingservice-container
        # image: test/paymentservice:latest
        image: 211125424910.dkr.ecr.us-east-1.amazonaws.com/shippingns/shipping:v1
        imagePullPolicy: IfNotPresent
        # imagePullPolicy: Never
        ports:
        - containerPort: 50051
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: shippingservice-config
              key: port
        - name: DISABLE_PROFILER
          valueFrom:
            configMapKeyRef:
              name: shippingservice-config
              key: disable-profiler
        - name: DISABLE_STATS
          valueFrom:
            configMapKeyRef:
              name: shippingservice-config
              key: disable-stats
        - name: DISABLE_TRACING
          valueFrom:
            configMapKeyRef:
              name: shippingservice-config
              key: disable-tracing
        resources:
          requests:
            cpu: 100m
            memory: 50Mi
          limits:
            cpu: 200m
            memory: 128Mi