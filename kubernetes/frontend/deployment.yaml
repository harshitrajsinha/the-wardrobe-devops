apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
  namespace: frontendns
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend-app
    spec:
      containers:
        - name: frontend-container
          # image: test/frontend:latest
          image: 211125424910.dkr.ecr.us-east-1.amazonaws.com/frontendns/frontend:v1
          imagePullPolicy: IfNotPresent
          # imagePullPolicy: Never
          ports:
          - containerPort: 8080
          env:
          - name: PORT
            valueFrom:
              configMapKeyRef:
                name: frontend-config
                key: port
          - name: PRODUCT_CATALOG_SERVICE_ADDR
            valueFrom:
              configMapKeyRef:
                name: frontend-config
                key: productcatalog-svc-addr
          - name: CURRENCY_SERVICE_ADDR
            valueFrom:
              configMapKeyRef:
                name: frontend-config
                key: currency-svc-addr
          - name: CART_SERVICE_ADDR
            valueFrom:
              configMapKeyRef:
                name: frontend-config
                key: cart-svc-addr
          - name: CHECKOUT_SERVICE_ADDR
            valueFrom:
              configMapKeyRef:
                name: frontend-config
                key: checkout-svc-addr
          - name: SHIPPING_SERVICE_ADDR
            valueFrom:
              configMapKeyRef:
                name: frontend-config
                key: shipping-svc-addr
          - name: ENABLE_PROFILER
            valueFrom:
              configMapKeyRef:
                name: frontend-config
                key: enable-profiler
          - name: ENABLE_TRACING
            valueFrom:
              configMapKeyRef:
                name: frontend-config
                key: enable-tracing
          - name: LISTEN_ADDR
            valueFrom:
              configMapKeyRef:
                name: frontend-config
                key: listen-addr
          - name: BASE_URL
            valueFrom:
              configMapKeyRef:
                name: frontend-config
                key: base-url
          resources:
            requests:
              cpu: 100m
              memory: 50Mi
            limits:
              cpu: 200m
              memory: 128Mi